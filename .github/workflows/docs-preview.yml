name: Docs preview
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'examples/**'
      - 'vocs.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
permissions:
  contents: read
  pull-requests: write
jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compute branch slug
        id: slug
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          slug=$(printf '%s' "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-28 | sed 's/-*$//')
          echo "value=$slug" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            📖 **Docs preview:** https://${{ steps.slug.outputs.value }}-shove-docs.zannis-kal.workers.dev

            Cloudflare Workers will deploy this branch automatically (~1–2 min after push).
            Re-run if the URL is stale.
