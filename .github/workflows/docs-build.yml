name: Docs build
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'examples/**'
      - 'vocs.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build