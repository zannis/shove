name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (none to skip)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        if: inputs.bump != 'none'
        run: cargo install -q cargo-edit

      - name: Bump version
        if: inputs.bump != 'none'
        run: cargo set-version -q --bump ${{ inputs.bump }}

      - name: Resolve version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import GPG signing key
        if: inputs.bump != 'none'
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Commit and tag
        if: inputs.bump != 'none'
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag -m "v${{ steps.version.outputs.version }}" "v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      - name: Authenticate with crates.io (trusted publishing)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish -q --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

      - name: Generate changelog
        run: |
          cargo install -q git-cliff --locked
          git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.version }}" -F RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}