name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (none to skip)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        if: inputs.bump != 'none'
        run: cargo install -q cargo-edit

      - name: Bump version
        if: inputs.bump != 'none'
        run: cargo set-version -q --bump ${{ inputs.bump }}

      - name: Resolve version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: inputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Publish to crates.io
        run: cargo publish -q --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Generate changelog
        run: |
          cargo install -q git-cliff --locked
          git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.version }}" -F RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}